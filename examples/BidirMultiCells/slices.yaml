-
  action: "add_pipelines"
  pipelines: 
    pl1: 
      f1: 
        type: "vector_magnitude"
        params: 
          field: "fluid_velocity"
          output_name: "fluid_vel_mag"
      f2: 
        type: "slice"
        params: 
          topology: "fluid_topo"
          point: 
            x: 180.0
            y: 180.0
            z: 0.0
          normal: 
            x: 1.0
            y: 0.0
            z: 0.0
    pl2:
      f1:
        type: "vector_magnitude"
        params:
          field: "fluid_velocity"
          output_name: "fluid_vel_mag"
      f2:
        type: "slice"
        params:
          topology: "fluid_topo"
          point:
            x: 180.0
            y: 180.0
            z: 0.0
          normal:
            x: 0.0
            y: 1.0
            z: 0.0
- 
  action: "add_scenes"
  scenes:
    s1:
      plots:
        p1:
          type: "pseudocolor"
          field: "fluid_vel_mag"
          pipeline: pl1
          min_value: 0.0
          max_value: 0.0006
          color_table:
            name: "Cold and Hot"
      renders:
        r1:
          image_width: 900
          image_height: 540
          image_name: "fluid_vel_mag_yz"
          annotations: "false"
          camera:
            position: [360.0, 180.0, 600.0]
            look_at: [180.0, 180.0, 600.0]
            up: [0.0, 1.0, 0.0]
            zoom: 1.0
            fov: 90.0
            near_plane: 0.5
            far_plane: 1000.0
    s2:
      plots:
        p1:
          type: "pseudocolor"
          field: "fluid_vel_mag"
          pipeline: pl2
          min_value: 0.0
          max_value: 0.0006
          color_table:
            name: "Cold and Hot"
      renders:
        r1:
          image_width: 900
          image_height: 540
          image_name: "fluid_vel_mag_xz"
          annotations: "false"
          camera:
            position: [180.0, 360.0, 600.0]
            look_at: [180.0, 180.0, 600.0]
            up: [1.0, 0.0, 0.0]
            zoom: 1.0
            fov: 90.0
            near_plane: 0.5
            far_plane: 1000.0
