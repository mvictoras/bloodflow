-
  action: "add_pipelines"
  pipelines: 
    pl1: 
      f1: 
        type: "vector_magnitude"
        params: 
          field: "fluid_velocity"
          output_name: "fluid_vel_mag"
      f2: 
        type: "slice"
        params: 
          topology: "fluid_topo"
          point: 
            x: 15
            y: 15
            z: 0
          normal: 
            x: 1.0
            y: 0.0
            z: 0.0
    pl2:
      f1:
        type: "vector_magnitude"
        params:
          field: "fluid_velocity"
          output_name: "fluid_vel_mag"
      f2:
        type: "slice"
        params:
          topology: "fluid_topo"
          point:
            x: 15
            y: 15
            z: 0
          normal:
            x: 0.0
            y: 1.0
            z: 0.0
- 
  action: "add_scenes"
  scenes:
    s1:
      plots:
        p1:
          type: "pseudocolor"
          field: "fluid_vel_mag"
          pipeline: pl1
          min_value: 0.0
          max_value: 0.0008
          color_table:
            name: "Inferno"
      renders:
        r1:
          image_width: 800
          image_height: 300
          image_name: "fluid_vel_mag_yz"
          annotations: "false"
          camera:
            position: [55.0, 15.0, 40.0]
            look_at: [15.0, 15.0, 40.0]
            up: [0.0, 1.0, 0.0]
            zoom: 1.0
            fov: 45.0
            near_plane: 0.5
            far_plane: 100.0
    s2:
      plots:
        p1:
          type: "pseudocolor"
          field: "fluid_vel_mag"
          pipeline: pl2
          min_value: 0.0
          max_value: 0.0008
          color_table:
            name: "Inferno"
      renders:
        r1:
          image_width: 800
          image_height: 300
          image_name: "fluid_vel_mag_xz"
          annotations: "false"
          camera:
            position: [15.0, 55.0, 40.0]
            look_at: [15.0, 15.0, 40.0]
            up: [1.0, 0.0, 0.0]
            zoom: 1.0
            fov: 45.0
            near_plane: 0.5
            far_plane: 100.0
